name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build, typecheck, lint
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies (skip postinstall scripts)
        run: npm ci --ignore-scripts

      - name: Build library
        run: npm run build

      - name: Run postinstall scripts (nuxt prepare, etc.)
        run: npm rebuild && npm run postinstall --if-present --workspaces --ignore-missing 2>/dev/null || true

      - name: Typecheck
        run: npm run typecheck

      - name: Lint
        run: npm run lint
